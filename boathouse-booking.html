<!DOCTYPE html>
<html>
<head>
<title>Boat House Booking</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<section class="container mt-5">
<h2 class="text-center mb-4">Boat House Booking</h2>

<form id="bookingForm">

<div class="form-group">
<label>Name</label>
<input type="text" class="form-control"
placeholder="Enter your name"
pattern="[A-Za-z\s]{3,30}"
title="Name should contain only letters (3-30 characters)"
required>
</div>

<div class="form-group mt-3">
<label>Email</label>
<input type="email" class="form-control"
placeholder="Enter email"
pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
title="Enter a valid email address"
required>
</div>

<div class="form-group mt-3">
<label>Phone</label>
<input type="tel" class="form-control"
placeholder="Enter phone number"
pattern="^(\+91[\-\s]?)?[0]?[6-9]\d{9}$"
title="Enter a valid Indian phone number (Example: 9876543210 or +91 9876543210)"
required>
</div>

<div class="form-group mt-3">
<label>Select Boat Type</label>
<select class="form-control" required>
<option value="">Select Boat</option>
<option>Luxury Houseboat</option>
<option>Premium Houseboat</option>
<option>Standard Houseboat</option>
</select>
</div>

<div class="form-group mt-3">
<label>Booking Date</label>
<input type="date" class="form-control" required>
</div>

<div class="form-group mt-3">
<label>Number of Persons</label>
<input type="number" class="form-control"
min="1" max="10"
required>
</div>

<button type="submit" class="btn btn-primary mt-4">
Book Now
</button>

</form>
</section>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e){
e.preventDefault();
alert("Your Boat House booking request has been submitted!");
});
</script>

</body>
</html>
