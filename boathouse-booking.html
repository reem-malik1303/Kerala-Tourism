<!DOCTYPE html>
<html>
<head>
<title>Boat House Booking</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<section class="container mt-5">
<h2 class="text-center mb-4">Boat House Booking</h2>

<form id="bookingForm">

<div class="form-group">
<label>Name</label>
<input type="text" class="form-control"
placeholder="Enter your name"
pattern="[A-Za-z\s]{3,30}"
title="Name should contain only letters (3-30 characters)"
required>
</div>

<div class="form-group mt-3">
<label>Email</label>
<input type="email" class="form-control"
placeholder="Enter email"
required>
</div>

<div class="form-group mt-3">
<label>Phone</label>
<input type="tel" class="form-control"
placeholder="Enter phone number"
pattern="^(\+91[\-\s]?)?[0]?[6-9]\d{9}$"
required>
</div>

<div class="form-group mt-3">
<label>Select Boat Type</label>
<select class="form-control" id="boatType" required>
<option value="">Select Boat</option>
<option value="12000">Luxury Houseboat - ₹12000</option>
<option value="8000">Premium Houseboat - ₹8000</option>
<option value="5000">Standard Houseboat - ₹5000</option>
</select>
</div>

<div class="form-group mt-3">
<label>Booking Date</label>
<input type="date" class="form-control" required>
</div>

<div class="form-group mt-3">
<label>Number of Persons</label>
<input type="number" class="form-control"
min="1" max="10"
required>
</div>

<!-- Advance Payment -->
<div class="form-group mt-3">
<label>Advance Payment (30%)</label>
<input type="text" id="advanceAmount" class="form-control" readonly>
</div>

<!-- Payment Method -->
<div class="form-group mt-3">
<label>Payment Method</label>
<select class="form-control" required>
<option value="">Select Payment</option>
<option>UPI</option>
<option>Credit Card</option>
<option>Debit Card</option>
<option>Net Banking</option>
</select>
</div>

<button type="submit" class="btn btn-primary mt-4">
Pay Advance & Book
</button>

</form>
</section>

<script>

const boatType = document.getElementById("boatType");
const advanceAmount = document.getElementById("advanceAmount");

boatType.addEventListener("change", function(){

let price = this.value;

if(price){
let advance = price * 0.30;
advanceAmount.value = "₹ " + advance;
}else{
advanceAmount.value = "";
}

});

document.getElementById("bookingForm").addEventListener("submit", function(e){
e.preventDefault();
alert("Booking submitted! Please complete the advance payment.");
});

</script>

</body>
</html>
