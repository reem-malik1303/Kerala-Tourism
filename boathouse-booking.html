<!DOCTYPE html>
<html>
<head>
<title>Boat House Booking</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<section class="container mt-5">

<h2 class="text-center mb-4">Boat House Booking</h2>

<form id="bookingForm">

<div class="form-group">
<label>Name</label>
<input type="text" class="form-control"
pattern="[A-Za-z\s]{3,30}" required>
</div>

<div class="form-group mt-3">
<label>Email</label>
<input type="email" class="form-control" required>
</div>

<div class="form-group mt-3">
<label>Phone</label>
<input type="tel" class="form-control"
pattern="^(\+91[\-\s]?)?[0]?[6-9]\d{9}$"
required>
</div>

<div class="form-group mt-3">
<label>Select Boat Type</label>
<select class="form-control" id="boatType" required>
<option value="">Select Boat</option>
<option value="12000">Luxury Houseboat - ₹12000</option>
<option value="8000">Premium Houseboat - ₹8000</option>
<option value="5000">Standard Houseboat - ₹5000</option>
</select>
</div>

<div class="form-group mt-3">
<label>Booking Date</label>
<input type="date" class="form-control" required>
</div>

<div class="form-group mt-3">
<label>Number of Persons</label>
<input type="number" class="form-control" min="1" max="10" required>
</div>

<div class="form-group mt-3">
<label>Total Amount</label>
<input type="text" id="totalAmount" class="form-control" readonly>
</div>

<button type="button" class="btn btn-success mt-4" onclick="generateQR()">
Generate QR Code
</button>

</form>

<div class="text-center mt-5">

<h4>Scan QR to Pay</h4>

<div id="qrcode"></div>

<br>

<p>Scan using Google Pay / PhonePe / Paytm</p>

<button class="btn btn-primary" onclick="confirmBooking()">
I Have Paid
</button>

</div>

</section>

<script>

let amount = 0;

document.getElementById("boatType").addEventListener("change", function(){
amount = this.value;
document.getElementById("totalAmount").value = "₹ " + amount;
});

function generateQR(){

if(amount == 0){
alert("Please select boat type");
return;
}

let upiLink = "upi://pay?pa=reemamalik1303-1@oksbi&pn=BoatHouseBooking&am=" + amount + "&cu=INR";
document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"), {
text: upiLink,
width: 220,
height: 220
});

}

function confirmBooking(){
alert("Payment successful! Your boat booking request has been submitted.");
}

</script>

</body>
</html>
